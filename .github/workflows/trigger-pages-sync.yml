name: Trigger my-pages notes sync

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger my-pages deployment
        env:
          DISPATCH_TOKEN: ${{ secrets.MY_PAGES_DISPATCH_TOKEN }}
        run: |
          curl -L --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Gralerfics/my-pages/dispatches \
            -d @- <<'EOF'
          {
            "event_type": "sync-notes",
            "client_payload": {
              "source_repository": "${{ github.repository }}",
              "source_ref": "${{ github.ref }}",
              "source_sha": "${{ github.sha }}"
            }
          }
          EOF
